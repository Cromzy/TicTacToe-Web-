<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe by Daniel Harrison</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Tic Tac Toe</h1>
    <label id="playerTurn">Welcome to tic tac toe!</label>
    <div class="cells">
        <div class="row1">
            <button class="cell" data-index="0">1</button>
            <button class="cell" data-index="1">2</button>
            <button class="cell" data-index="2">3</button>
        </div>

        <div class="row2">
            <button class="cell" data-index="3">4</button>
            <button class="cell" data-index="4">5</button>
            <button class="cell" data-index="5">6</button>
        </div>

        <div class="row3">
            <button class="cell" data-index="6">7</button>
            <button class="cell" data-index="7">8</button>
            <button class="cell" data-index="8">9</button>
        </div>
    </div>
<script src="script.js"></script>
</body>

</html>
