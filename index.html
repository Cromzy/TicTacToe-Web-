<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe by Daniel Harrison</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Tic Tac Toe</h1>
    <label id="playerTurn">Welcome to tic tac toe!</label>
    <div class="cells">
        <div class="row1">
            <button id="cell1" class="cell">1</button>
            <button id="cell2" class="cell">2</button>
            <button id="cell3" class="cell">3</button>
        </div>

        <div class="row2">
            <button id="cell4" class="cell">4</button>
            <button id="cell5" class="cell">5</button>
            <button id="cell6" class="cell">6</button>
        </div>

        <div class="row3">
            <button id="cell7" class="cell">7</button>
            <button id="cell8" class="cell">8</button>
            <button id="cell9" class="cell">9</button>
        </div>
    </div>
<script src="script.js"></script>
</body>

</html>
